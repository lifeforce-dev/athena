<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTS Command Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=Hind+Madurai:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06080b;
      --panel: #0e131a;
      --panel-2: #0a0f15;
      --ink: #dce7f5;
      --muted: #7f8aa1;
      --accent: #57f6c6;
      --warn: #ff7b7b;
      --grid: rgba(255,255,255,0.04);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hind Madurai", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 700px at 10% -10%, rgba(60,80,120,0.3), transparent 60%),
        radial-gradient(800px 500px at 90% 10%, rgba(40,70,90,0.25), transparent 50%),
        var(--bg);
    }
    .wrap { max-width: 1300px; margin: 36px auto; padding: 0 24px 60px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; }
    .title { font-family: "Oxanium", sans-serif; font-size: 28px; letter-spacing: 2px; }
    .status { font-size: 12px; color: var(--muted); text-transform: uppercase; }

    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 18px; margin-top: 18px; }
    .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; }

    .hud {
      display: grid; gap: 12px;
    }
    .metric {
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
    }
    .metric .label { font-size: 11px; color: var(--muted); letter-spacing: 1.4px; text-transform: uppercase; }
    .metric .value { font-family: "Oxanium"; font-size: 22px; margin-top: 6px; }

    .gridmap {
      position: relative;
      background: var(--panel-2);
      border-radius: 14px;
      height: 420px;
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .gridmap::before {
      content: "";
      position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, transparent, transparent 60px, var(--grid) 60px, var(--grid) 61px),
                  repeating-linear-gradient(180deg, transparent, transparent 60px, var(--grid) 60px, var(--grid) 61px);
    }
    .bar {
      position: absolute; bottom: 0; width: 52px; border-radius: 10px 10px 0 0;
      background: linear-gradient(180deg, rgba(87,246,198,0.4), rgba(87,246,198,0.1));
      border: 1px solid rgba(87,246,198,0.4);
    }
    .bar.red {
      background: linear-gradient(180deg, rgba(255,123,123,0.4), rgba(255,123,123,0.1));
      border-color: rgba(255,123,123,0.5);
    }
    .bar label {
      position: absolute; top: -18px; left: 0; right: 0; text-align: center; font-size: 11px; color: var(--muted);
    }
    .threshold {
      position: absolute; left: 0; right: 0; bottom: 90px; height: 2px; background: rgba(255,123,123,0.6);
    }
    .threshold span {
      position: absolute; right: 12px; top: -18px; font-size: 11px; color: var(--warn);
      background: rgba(255,123,123,0.15); padding: 4px 8px; border-radius: 8px;
    }

    .pipeline {
      margin-top: 16px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 12px;
    }
    .pipe-row { display: grid; grid-template-columns: 90px 1fr 90px; gap: 8px; font-size: 12px; padding: 6px 0; }
    .pipe-row + .pipe-row { border-top: 1px dashed rgba(255,255,255,0.06); }
    .amt { text-align: right; color: var(--warn); font-weight: 600; }
    .amt.pos { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">SYS.MONITOR.ACTIVE</div>
        <div class="status">Income / Outflow Command Grid</div>
      </div>
      <div class="status">Current Balance: <strong style="color:var(--accent)">$2,528.36</strong></div>
    </div>

    <div class="grid">
      <div class="panel hud">
        <div class="metric">
          <div class="label">Days To Zero</div>
          <div class="value">42 days</div>
        </div>
        <div class="metric">
          <div class="label">Next Inflow</div>
          <div class="value">$3,877 • Feb 23</div>
        </div>
        <div class="metric">
          <div class="label">Rent Threshold</div>
          <div class="value" style="color:var(--warn)">$2,650</div>
        </div>
        <div class="pipeline">
          <div class="pipe-row"><div>Feb 08</div><div>Food (weekly)</div><div class="amt">-$120</div></div>
          <div class="pipe-row"><div>Feb 15</div><div>Food (weekly)</div><div class="amt">-$120</div></div>
          <div class="pipe-row"><div>Feb 23</div><div>Paycheck</div><div class="amt pos">+$3,877</div></div>
          <div class="pipe-row"><div>Mar 05</div><div>Rent</div><div class="amt">-$2,650</div></div>
        </div>
      </div>

      <div class="panel">
        <div class="gridmap">
          <div class="threshold"><span>Critical: Rent</span></div>
          <div class="bar red" style="left: 40px; height: 120px;"><label>Feb 08</label></div>
          <div class="bar red" style="left: 120px; height: 120px;"><label>Feb 15</label></div>
          <div class="bar" style="left: 200px; height: 320px;"><label>Feb 23</label></div>
          <div class="bar red" style="left: 280px; height: 160px;"><label>Mar 05</label></div>
          <div class="bar red" style="left: 360px; height: 130px;"><label>Mar 06</label></div>
          <div class="bar" style="left: 440px; height: 300px;"><label>Mar 20</label></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
