<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starship Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#05070a; --panel:#0e1218; --ink:#e9f0ff; --muted:#7c88a1; --accent:#66e0ff; --warn:#ff7f7f; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Source Sans 3", system-ui, sans-serif; color: var(--ink);
      background: radial-gradient(900px 700px at 20% -10%, #1b2336 0%, transparent 60%),
                  radial-gradient(700px 500px at 90% 10%, #1a1830 0%, transparent 55%),
                  var(--bg);
    }
    .wrap { max-width: 1200px; margin: 38px auto; padding: 0 24px 60px; }
    .title { font-family: "Rajdhani"; font-size: 32px; margin: 0; letter-spacing: 1px; }
    .hint { color: var(--muted); font-size: 12px; }

    .grid { display: grid; grid-template-columns: 1fr 380px; gap: 18px; margin-top: 20px; }
    .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; }

    .trajectory { height: 360px; position: relative; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
    .trajectory svg { width: 100%; height: 100%; }
    .marker {
      position: absolute; top: 18px; right: 18px; font-size: 11px; padding: 6px 10px; border-radius: 999px;
      background: rgba(255,127,127,0.15); color: var(--warn); border: 1px solid rgba(255,127,127,0.3);
    }

    .stack { display: grid; gap: 12px; }
    .metric { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px; }
    .metric .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; }
    .metric .value { font-family: "Rajdhani"; font-size: 24px; margin-top: 6px; }

    .queue { margin-top: 12px; }
    .row { display: grid; grid-template-columns: 80px 1fr 90px; font-size: 12px; padding: 6px 0; }
    .row + .row { border-top: 1px dashed rgba(255,255,255,0.06); }
    .amt { text-align: right; color: var(--warn); font-weight: 600; }
    .amt.pos { color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title">Starship Ops</h1>
    <div class="hint">Trajectory of funds with mission-critical milestones.</div>

    <div class="grid">
      <div class="panel">
        <div class="trajectory">
          <span class="marker">Rent Due • Mar 05</span>
          <svg viewBox="0 0 640 320" preserveAspectRatio="none">
            <defs>
              <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#66e0ff" />
                <stop offset="1" stop-color="#9b7bff" />
              </linearGradient>
            </defs>
            <path d="M0,210 L100,190 L220,200 L300,110 L380,140 L460,120 L540,160 L640,150" fill="none" stroke="url(#trail)" stroke-width="3" />
            <line x1="360" y1="0" x2="360" y2="320" stroke="rgba(255,127,127,0.45)" stroke-dasharray="4 6" />
          </svg>
        </div>
      </div>

      <div class="panel stack">
        <div class="metric"><div class="label">Current Fuel</div><div class="value">$2,528.36</div></div>
        <div class="metric"><div class="label">Next Boost</div><div class="value">+$3,877 • Feb 23</div></div>
        <div class="metric"><div class="label">Days to Zero</div><div class="value">42 days</div></div>

        <div class="queue">
          <div class="row"><div>Feb 08</div><div>Food (weekly)</div><div class="amt">-$120</div></div>
          <div class="row"><div>Feb 23</div><div>Paycheck</div><div class="amt pos">+$3,877</div></div>
          <div class="row"><div>Mar 05</div><div>Rent</div><div class="amt">-$2,650</div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
