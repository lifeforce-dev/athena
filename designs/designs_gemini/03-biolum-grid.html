<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLum Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #03080f;
            --cell-bg: #0a111a;
            --cell-hover: #121e2e;
            --glow-safe: #00ffaa;
            --glow-warn: #ffcc00;
            --glow-danger: #ff0055;
            --text-main: #c0d0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        h1 { margin: 0; font-weight: 300; letter-spacing: -1px; }
        
        .legend {
            font-size: 0.8rem;
            display: flex;
            gap: 20px;
        }
        
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: auto repeat(5, 1fr);
            gap: 4px;
            padding: 20px 50px 50px 50px;
            height: 100%;
        }

        /* Day Headers */
        .day-header {
            text-align: center;
            font-weight: 700;
            color: #445566;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 10px;
        }

        /* Calendar Cell */
        .cell {
            background: var(--cell-bg);
            border-radius: 8px;
            padding: 15px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            cursor: pointer;
        }

        .cell:hover {
            background: var(--cell-hover);
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .date-num {
            font-size: 1.2rem;
            font-weight: 700;
            opacity: 0.5;
        }

        .bal-display {
            font-size: 1rem;
            font-weight: 500;
            text-align: right;
        }

        /* Status Glows */
        .status-safe { color: var(--glow-safe); text-shadow: 0 0 10px rgba(0,255,170,0.3); }
        .status-warn { color: var(--glow-warn); text-shadow: 0 0 10px rgba(255,200,0,0.3); }
        .status-danger { color: var(--glow-danger); text-shadow: 0 0 15px rgba(255,0,85,0.5); border: 1px solid rgba(255,0,85,0.3); }

        /* Transaction Dots */
        .tx-dots {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tx-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #445566;
        }
        
        .tx-dot.in { background: #fff; box-shadow: 0 0 5px #fff; }
        .tx-dot.out { background: rgba(255,255,255,0.2); }

        /* Modal / Detail View (Overlay) */
        .overlay {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 300px;
            background: rgba(10, 15, 20, 0.95);
            border: 1px solid #334455;
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            opacity: 0; 
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
        }
        
        .cell:hover ~ .overlay, .cell:active ~ .overlay {
             
        }
        
        /* Simulating selection for demo without complex JS state */
        .selected-details {
            display: none; /* In real app, toggle this */
        }

        .cell:hover::after {
            /* Hover effect details */
        }

    </style>
</head>
<body>
    <header>
        <div>
            <h1>PROJECTION MATRIX</h1>
            <div style="font-size: 0.9rem; color: #556677;">Feb 2026</div>
        </div>
        <div class="legend">
            <div><span class="dot" style="background:var(--glow-safe)"></span> Safe (>2k)</div>
            <div><span class="dot" style="background:var(--glow-warn)"></span> Tight (<2k)</div>
            <div><span class="dot" style="background:var(--glow-danger)"></span> Critical (<0)</div>
        </div>
    </header>

    <div class="grid-container" id="grid">
        <div class="day-header">Sun</div>
        <div class="day-header">Mon</div>
        <div class="day-header">Tue</div>
        <div class="day-header">Wed</div>
        <div class="day-header">Thu</div>
        <div class="day-header">Fri</div>
        <div class="day-header">Sat</div>
        <!-- Cells Injected -->
    </div>

    <script>
        const startBalance = 2528.36;
        const startDate = new Date('2026-02-08'); // Sunday
        
        // Mock Recurring logic (simplified)
        const getTx = (d) => {
            const txs = [];
            const day = d.getDate();
            const dateStr = d.toISOString().split('T')[0];
            
            // Randomish but deterministic logic for demo
            if(d.getDay() === 0) txs.push({n:'Food', a:-120, type:'out'});
            
            // Paydays (Feb 23)
            if(day === 23 && d.getMonth() === 1) { // Feb 23
                 txs.push({n:'Paycheck', a:3877, type:'in'});
                 txs.push({n:'BeyondFinance', a:-579, type:'out'});
            }
            
            if(day === 5) txs.push({n:'Rent', a:-2650, type:'out'});
            if(day === 6) txs.push({n:'Loans', a:-324, type:'out'});
            if(day === 1) txs.push({n:'Essentials', a:-200, type:'out'});
            
            return txs;
        };

        const grid = document.getElementById('grid');
        let running = startBalance;

        for(let i=0; i<35; i++) {
            const currDate = new Date(startDate);
            currDate.setDate(startDate.getDate() + i);
            
            const txs = getTx(currDate);
            let dayDelta = 0;
            txs.forEach(t => dayDelta += t.a);
            
            // Capture lowest point of the day if big outflow
            let lowPoint = running;
            if(dayDelta < 0) lowPoint += dayDelta; 
            
            running += dayDelta;

            // Determine status
            let statusClass = 'status-safe';
            if (running < 0 || lowPoint < 0) statusClass = 'status-danger';
            else if (running < 2000) statusClass = 'status-warn';

            const cell = document.createElement('div');
            cell.className = `cell ${statusClass}`;
            
            let dotsHtml = txs.map(t => `<div class="tx-dot ${t.type}"></div>`).join('');
            
            cell.innerHTML = `
                <div class="date-num">${currDate.getDate()}</div>
                <div class="tx-dots">${dotsHtml}</div>
                <div class="bal-display">$${Math.round(running)}</div>
            `;
            
            // Tooltip logic (simulated)
            cell.title = txs.length > 0 ? txs.map(t => `${t.n}: ${t.a}`).join('\n') : 'No activity';

            grid.appendChild(cell);
        }
    </script>
</body>
</html>
