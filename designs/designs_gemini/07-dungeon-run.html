<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUNGEON RUN // CASH FLOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a0b0b;
            --hp-red: #d32f2f;
            --mana-blue: #1976d2;
            --gold: #ffb300;
            --stone: #424242;
            --path: #2d2d2d;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Lato', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top HUD */
        header {
            height: 100px;
            background: linear-gradient(to bottom, #2a1b1b, #1a0b0b);
            border-bottom: 4px solid var(--stone);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 5px 15px #000;
            z-index: 10;
        }

        .avatar-frame {
            width: 80px; height: 80px;
            background: #000;
            border: 2px solid var(--gold);
            border-radius: 50%;
            position: absolute;
            left: 20px;
            overflow: hidden;
            display: grid;
            place-items: center;
            font-family: 'Cinzel';
            color: var(--gold);
            font-size: 2rem;
            background-image: radial-gradient(circle, #444, #000);
        }

        .bars-container {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bar-wrap {
            width: 100%;
            background: #000;
            border: 2px solid #555;
            height: 30px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .hp-bar {
            width: 42%; /* Mock start */
            height: 100%;
            background: linear-gradient(90deg, #b71c1c, var(--hp-red));
            box-shadow: 0 0 10px var(--hp-red);
            transition: width 0.5s;
        }

        .bar-text {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            z-index: 2;
        }

        .xp-bar {
            height: 10px;
            background: #333;
            margin-top: 5px;
            width: 100%;
        }
        
        /* The Dungeon Path */
        main {
            flex: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            background: 
                linear-gradient(var(--stone) 2px, transparent 2px) 0 0,
                linear-gradient(90deg, var(--stone) 2px, transparent 2px) 0 0;
            background-size: 100px 100px;
            background-color: #111;
            display: flex;
            align-items: center;
            padding-left: 100px; /* Player Start */
        }
        
        /* The Floor */
        .floor {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 15%;
            width: 3000px; /* Long scrolling level */
            background: #1a1a1a;
            border-top: 5px solid #333;
        }

        /* Player Character Placement */
        .player-char {
            position: absolute;
            left: 50px;
            bottom: 16%; 
            width: 40px; 
            height: 80px;
            background: #fff;
            box-shadow: 0 0 20px #fff;
            z-index: 10;
        }
        
        /* Enemies (Bills) */
        .enemy {
            position: absolute;
            bottom: 16%;
            width: 50px;
            background: linear-gradient(to top, #300, #500);
            border: 1px solid #f00;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .enemy:hover { transform: scale(1.1); z-index: 20; }
        
        .enemy-label {
            position: absolute;
            bottom: 100%;
            white-space: nowrap;
            background: rgba(0,0,0,0.8);
            padding: 5px;
            border: 1px solid #500;
            font-size: 0.8rem;
            color: #f88;
            margin-bottom: 5px;
        }
        
        .boss {
            width: 120px;
            background: linear-gradient(to top, #200, #800);
            border: 2px solid #f00;
            box-shadow: 0 0 30px #f00;
        }

        /* Loot (Income) */
        .loot-chest {
            position: absolute;
            bottom: 16%;
            width: 60px;
            height: 40px;
            background: radial-gradient(circle, var(--gold), #f57f17);
            border-radius: 10px 10px 0 0;
            box-shadow: 0 0 20px var(--gold);
            z-index: 5;
            display: grid;
            place-items: center;
            color: #000;
            font-weight: bold;
            font-family: 'Cinzel';
        }

        /* Day Markers on Floor */
        .day-marker {
            position: absolute;
            bottom: 20px;
            color: #555;
            font-size: 0.8rem;
            border-left: 1px solid #333;
            padding-left: 5px;
            height: 30px;
        }

    </style>
</head>
<body>
    <header>
        <div class="avatar-frame">Hero</div>
        <div class="bars-container">
            <div class="bar-wrap">
                <div class="bar-text">Current HP: $2,528 / $6,000</div>
                <div class="hp-bar" style="width: 42%;"></div>
            </div>
            <div style="font-size: 0.8rem; color: #888; text-align: center;">LEVEL 2: FEBRUARY</div>
        </div>
    </header>

    <main id="level-track">
        <div class="floor"></div>
        <div class="player-char" title="Today"></div>

        <!-- JS Injected Enemies -->
    </main>

    <script>
        const track = document.getElementById('level-track');
        // 1 day = 50px
        const pxPerDay = 80;
        
        // Items
        const encounters = [
            { day: 0, name: "Food", val: 120, type: 'mob' },
            { day: 7, name: "Food", val: 120, type: 'mob' },
            { day: 15, name: "PAYCHECK (Loot)", val: 3877, type: 'loot' },
            { day: 15, name: "Debt Goblin", val: 579, type: 'mob' },
            { day: 25, name: "THE LANDLORD (Boss)", val: 2650, type: 'boss' },
            { day: 26, name: "School Lich", val: 324, type: 'mob' },
        ];

        encounters.forEach(e => {
            const leftPos = 100 + (e.day * pxPerDay); // 100 is player offset
            
            if (e.type === 'loot') {
                const chest = document.createElement('div');
                chest.className = 'loot-chest';
                chest.style.left = leftPos + 'px';
                chest.innerText = '+$' + e.val;
                track.appendChild(chest);
            } else {
                const mob = document.createElement('div');
                mob.className = `enemy ${e.type === 'boss' ? 'boss' : ''}`;
                mob.style.left = leftPos + 'px';
                // Scale height by value. max 2650 -> 300px height
                const h = Math.min(300, Math.max(40, (e.val / 2650) * 250));
                mob.style.height = h + 'px';
                
                mob.innerHTML = `
                    <div class="enemy-label">${e.name} (-${e.val})</div>
                `;
                track.appendChild(mob);
            }
        });

        // Add Floor Markers
        for(let i=0; i<35; i++) {
            const m = document.createElement('div');
            m.className = 'day-marker';
            m.style.left = (100 + i * pxPerDay) + 'px';
            m.innerText = `Day ${i}`;
            track.appendChild(m);
        }

    </script>
</body>
</html>
