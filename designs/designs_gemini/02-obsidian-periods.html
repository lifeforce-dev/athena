<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Flows</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000000;
            --glass-surface: rgba(30, 30, 35, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-purple: #7000ff;
            --accent-cyan: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #888888;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background: linear-gradient(to bottom right, #050510, #000000);
        }

        .layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Pay Period Columns */
        .periods-container {
            display: flex;
            gap: 20px;
            padding: 40px;
            overflow-x: auto;
            align-items: flex-start;
            height: 100%;
            box-sizing: border-box;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .period-card {
            min-width: 320px;
            background: var(--glass-surface);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s;
            max-height: 90%;
        }

        .period-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.2);
        }

        /* Card Header */
        .card-header {
            padding: 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
            border-bottom: 1px solid var(--glass-border);
        }

        .period-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .check-amount {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .check-date {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            margin-top: 4px;
        }

        /* Transaction Flow */
        .tx-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .tx-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .tx-left { display: flex; flex-direction: column; }
        .tx-name { font-weight: 500; font-size: 0.95rem; }
        .tx-date { font-size: 0.75rem; color: var(--text-dim); }
        .tx-amt { font-weight: 600; }
        
        .outflow { color: #ff8b8b; }
        .inflow { color: var(--accent-cyan); }

        /* Card Footer - Outcome */
        .card-footer {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid var(--glass-border);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .result-label { color: var(--text-dim); font-size: 0.9rem; }
        .result-val { font-size: 1.2rem; font-weight: 700; }

        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
        }

        /* Current Status Sidebar */
        .sidebar {
            width: 300px;
            background: rgba(10,10,12,0.95);
            border-right: 1px solid var(--glass-border);
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 10;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin: 0;
            color: #fff;
        }

        .stat-block h3 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .big-number {
            font-size: 2.5rem;
            font-weight: 300;
        }

        .alert-box {
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.3);
            padding: 15px;
            border-radius: 12px;
            color: #ffcccc;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div>
                <h1>Obsidian<br><span style="color:var(--accent-cyan)">Flows</span></h1>
            </div>

            <div class="stat-block">
                <h3>Current Cash</h3>
                <div class="big-number">$2,528.<span style="font-size:1.5rem; color:var(--text-dim)">36</span></div>
            </div>

            <div class="stat-block">
                <h3>Safety Margin</h3>
                <div style="font-size: 1.2rem; color: #ff8b8b;">Rent Pending</div>
                <div class="alert-box" style="margin-top:10px;">
                    Warning: Rent ($2,650) exceeds current balance. Waiting for Feb 23 check.
                </div>
            </div>
            
            <div style="margin-top: auto; font-size: 0.8rem; color: var(--text-dim);">
                Updated: Feb 08, 2026
            </div>
        </aside>

        <main class="periods-container" id="periods">
            <!-- Rendered via JS -->
        </main>
    </div>

    <script>
        const periods = [
            {
                id: 1,
                label: "Current Span",
                startDate: "Feb 08",
                startBal: 2528.36,
                items: [
                   { n: "Food", d: "Feb 08", a: -120 },
                   { n: "Food", d: "Feb 15", a: -120 },
                   { n: "Subs & Misc", d: "Feb 20", a: -70 }, 
                ],
                incomingLabel: "Current",
                incomingAmt: 0
            },
            {
                id: 2,
                label: "Next Paycheck",
                startDate: "Feb 23",
                startBal: 2218.36, // carried over
                incomingLabel: "Blizzard Pay",
                incomingAmt: 3877.00,
                items: [
                    { n: "BeyondFinance", d: "Feb 23", a: -579.26 },
                    { n: "Essentials", d: "Mar 01", a: -200 },
                    { n: "Rent (Calypso)", d: "Mar 05", a: -2650.00 },
                    { n: "Student Loan", d: "Mar 06", a: -324.33 },
                    { n: "Food", d: "Various", a: -240 },
                ]
            },
            {
                id: 3,
                label: "March Mid",
                startDate: "Mar 09",
                startBal: 2101.77,
                incomingLabel: "Blizzard Pay",
                incomingAmt: 3877.00,
                items: [
                    { n: "BeyondFinance", d: "Mar 09", a: -579.26 },
                    { n: "Car Insurance", d: "Mar 21", a: -184.48 },
                    { n: "Savings", d: "Mar 22", a: -1000 },
                ]
            }
        ];

        const container = document.getElementById('periods');

        periods.forEach(p => {
            // Calculate end balance
            let running = p.startBal + p.incomingAmt;
            let outflow = 0;
            p.items.forEach(i => {
                running += i.a;
                if(i.a < 0) outflow += Math.abs(i.a);
            });

            // Percent bar (How much of the inflow+start is eaten by bills?)
            const totalAvailable = p.startBal + p.incomingAmt;
            const consumedPct = Math.min(100, (outflow / totalAvailable) * 100);

            const card = document.createElement('div');
            card.className = 'period-card';
            
            let incomingHtml = '';
            if (p.incomingAmt > 0) {
                incomingHtml = `
                     <div class="period-label">PAYCHECK INBOUND</div>
                    <div class="check-amount">+$${p.incomingAmt.toLocaleString()}</div>
                    <div class="check-date">${p.incomingLabel} • ${p.startDate}</div>
                `;
            } else {
                incomingHtml = `
                    <div class="period-label">CURRENT PERIOD</div>
                    <div class="check-amount" style="font-size: 1.5rem; color: #fff;">Drifting...</div>
                    <div class="check-date">Until Feb 23</div>
                `;
            }

            let itemsHtml = p.items.map(i => `
                <div class="tx-item">
                    <div class="tx-left">
                        <span class="tx-name">${i.n}</span>
                        <span class="tx-date">${i.d}</span>
                    </div>
                    <div class="tx-amt ${i.a < 0 ? 'outflow' : 'inflow'}">${i.a}</div>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="card-header">
                   ${incomingHtml}
                </div>
                <div class="tx-list">
                    ${itemsHtml}
                </div>
                <div class="card-footer">
                    <div class="result-row">
                        <span class="result-label">End Balance</span>
                        <span class="result-val">$${running.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="fill" style="width: ${100 - consumedPct}%; background: ${running < 0 ? '#ff0055' : ''}"></div>
                    </div>
                    <div style="font-size: 0.7rem; color: #666; margin-top: 5px; text-align: right;">
                        ${(100-consumedPct).toFixed(0)}% Free Cash
                    </div>
                </div>
            `;
            
            container.appendChild(card);
        });
    </script>
</body>
</html>
