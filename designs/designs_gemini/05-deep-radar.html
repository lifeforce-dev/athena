<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Jura:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --radar-line: rgba(70, 130, 180, 0.2);
            --sweep: rgba(0, 150, 255, 0.1);
            --blip-safe: #64ffda;
            --blip-danger: #ff5252;
            --text-main: #b0c4de;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Jura', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Bg Grid */
        .radar-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--radar-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--radar-line) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            perspective: 1000px;
            transform: scale(1.1);
        }
        
        .radar-grid::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 0%, var(--bg) 90%);
        }

        /* Hero Status */
        .status-panel {
            text-align: center;
            padding: 50px;
            z-index: 10;
        }

        .min-clearance-label {
            font-family: 'Michroma', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #567;
            margin-bottom: 20px;
        }

        .min-clearance-val {
            font-family: 'Michroma', sans-serif;
            font-size: 4rem;
            color: #fff;
            text-shadow: 0 0 20px var(--blip-safe);
            transition: color 0.3s;
        }
        
        .min-clearance-val.danger {
            color: var(--blip-danger);
            text-shadow: 0 0 30px red;
        }

        .min-clearance-date {
            margin-top: 10px;
            font-size: 1.2rem;
            color: var(--blip-safe);
        }

        /* Timeline Scroller */
        .scan-track {
            flex: 1;
            position: relative;
            margin: 0 50px 50px 50px;
            background: rgba(10, 20, 30, 0.5);
            border: 1px solid #345;
            border-radius: 4px;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }
        
        .horizon-line {
            width: 2000px; /* mock width */
            position: relative;
            height: 200px;
            border-bottom: 2px solid #345;
        }
        
        /* Zero line */
        .zero-line {
            position: absolute;
            bottom: 50px; /* Let's say 0 is 50px up */
            left: 0; right: 0;
            height: 1px;
            border-bottom: 1px dashed red;
            opacity: 0.5;
        }
        
        /* Data Points */
        .point {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, 50%);
            transition: all 0.2s;
        }
        
        .point:hover { transform: scale(2); box-shadow: 0 0 10px white;}
        
        .connector {
            position: absolute;
            height: 2px;
            background: var(--text-main);
            transform-origin: left center;
        }

        .event-flag {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            white-space: nowrap;
            padding-bottom: 5px;
            color: #567;
            border-left: 1px solid #567;
            padding-left: 5px;
            height: 20px;
        }

        /* Sweep Animation */
        .scan-line {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: var(--blip-safe);
            box-shadow: 0 0 20px var(--blip-safe);
            width: 100px;
            background: linear-gradient(90deg, transparent, rgba(100,255,218,0.2) 90%, var(--blip-safe));
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 5;
        }
        
        @keyframes scan {
            0% { left: -100px; }
            100% { left: 100%; }
        }

    </style>
</head>
<body>
    <div class="radar-grid"></div>

    <section class="status-panel">
        <div class="min-clearance-label">Projected Minimum Clearance (30 Days)</div>
        <div class="min-clearance-val" id="minVal">$889.04</div>
        <div class="min-clearance-date">Occurring on Mar 06, 2026</div>
        <div style="margin-top: 10px; font-size: 0.8rem; opacity: 0.7;">
            Currently: $2,528.36
        </div>
    </section>

    <div class="scan-track">
        <div class="scan-line"></div>
        <div class="horizon-line" id="horizon" style="width: 100%; max-width: 1200px; margin: 0 auto;">
            <div class="zero-line"></div>
            <!-- Injected -->
        </div>
    </div>

    <script>
        // Data same as before
        const points = [
            { d: 0, val: 2528 },
            { d: 5, val: 2300 },
            { d: 10, val: 2100 },
            { d: 15, val: 1980 }, // Paycheck comes
            { d: 16, val: 5600 },
            { d: 20, val: 5000 },
            { d: 25, val: 2350 }, // RENT HIT
            { d: 26, val: 1800 },
            { d: 30, val: 889 }, // Low point
            { d: 35, val: 780 }
        ];

        const container = document.getElementById('horizon');
        const h = 200;
        const w = container.offsetWidth;
        const maxVal = 6000;
        const minVal = 0; // chart floor
        
        // Scale Y
        const getY = (val) => {
            const range = maxVal - minVal;
            const pct = (val - minVal) / range;
            // invert because bottom is 0
            return h - (pct * h);
        };
        
        const getX = (idx) => {
            return (idx / (points.length - 1)) * w;
        }

        // Render Lines
        points.forEach((p, i) => {
            if (i === points.length - 1) return;
            
            const next = points[i+1];
            
            const x1 = getX(i);
            const y1 = getY(p.val);
            const x2 = getX(i+1);
            const y2 = getY(next.val);
            
            // Draw Line
            const len = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2));
            const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
            
            const line = document.createElement('div');
            line.className = 'connector';
            line.style.width = len + 'px';
            line.style.left = x1 + 'px';
            line.style.top = y1 + 'px';
            line.style.transform = `rotate(${angle}deg)`;
            
             // Color logic
            if (next.val < 1000) line.style.background = '#ff5252';
            else if (next.val > p.val) line.style.background = '#64ffda'; // up
            else line.style.background = '#4682b4';
            
            container.appendChild(line);
            
            // Dot
            const dot = document.createElement('div');
            dot.className = 'point';
            dot.style.left = x1 + 'px';
            dot.style.top = y1 + 'px';
            dot.title = `$${p.val}`;
            
            if (p.val < 1000) dot.style.background = 'red';
            
            container.appendChild(dot);
            
            // Flag mostly for drops
            if (next.val < p.val - 500) {
                 const flag = document.createElement('div');
                 flag.className = 'event-flag';
                 flag.innerText = 'DROP';
                 flag.style.left = x1 + 'px';
                 flag.style.top = (y1 - 30) + 'px';
                 container.appendChild(flag);
            }
        });
        
    </script>
</body>
</html>
