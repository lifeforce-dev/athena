<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON HUD // CASH_OPS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --grid-color: rgba(0, 255, 65, 0.05);
            --neon-green: #00ff41;
            --neon-red: #ff003c;
            --neon-blue: #00f3ff;
            --neon-amber: #ffb800;
            --text-color: #e0e0e0;
            --panel-bg: rgba(10, 20, 15, 0.9);
            --border-color: rgba(0, 255, 65, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            overflow-x: hidden;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            text-transform: uppercase;
        }

        /* Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            background: linear-gradient(90deg, rgba(0,255,65,0.1), transparent);
            box-shadow: 0 0 15px rgba(0,255,65,0.1);
        }

        .system-status {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .blink { animation: blinker 2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .big-stat {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 0 10px var(--neon-green);
            color: var(--neon-green);
        }

        .label {
            font-size: 0.8rem;
            color: var(--neon-blue);
            letter-spacing: 2px;
        }

        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2px;
            height: 100%;
            overflow: hidden;
        }

        aside {
            border-right: 2px solid var(--border-color);
            background: rgba(0,0,0,0.5);
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .tactical-list {
            list-style: none;
        }

        .tactical-item {
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 10px;
            position: relative;
            transition: all 0.2s;
            cursor: crosshair;
        }
        
        .tactical-item:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
        }
        
        .tactical-item.warning { border-left: 4px solid var(--neon-red); }
        .tactical-item.safe { border-left: 4px solid var(--neon-green); }

        .item-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .item-name { font-weight: bold; color: #fff; }
        .item-date { font-size: 0.8rem; color: var(--neon-blue); }
        .item-amt { font-family: 'Rajdhani'; font-weight: 700; font-size: 1.2rem; }
        .neg { color: var(--neon-red); }
        .pos { color: var(--neon-green); }

        /* Chart Area */
        .chart-container {
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: radial-gradient(circle at center, rgba(0,255,65,0.02) 0%, transparent 70%);
        }

        .rent-threshold-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--neon-red);
            bottom: 30%; /* Mock position */
            z-index: 10;
            box-shadow: 0 0 10px var(--neon-red);
            border-bottom: 1px dashed rgba(255,0,0,0.5);
            pointer-events: none;
        }
        
        .rent-label {
            position: absolute;
            right: 10px;
            top: -25px;
            background: var(--neon-red);
            color: #000;
            padding: 2px 8px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .timeline-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: flex-end;
            gap: 2px;
            position: relative;
        }

        /* Bars */
        .bar {
            flex: 1;
            background: rgba(0, 255, 65, 0.2);
            border-top: 2px solid var(--neon-green);
            position: relative;
            transition: height 0.5s ease;
            min-width: 10px;
        }

        .bar:hover {
            background: rgba(0, 255, 65, 0.5);
            box-shadow: 0 0 20px var(--neon-green);
        }

        .bar.danger-zone {
            background: rgba(255, 0, 60, 0.2);
            border-top-color: var(--neon-red);
        }

        .bar-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 5px 10px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 20;
            margin-bottom: 10px;
        }

        .bar:hover .bar-tooltip { opacity: 1; }

        .time-axis {
            height: 30px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            color: var(--neon-blue);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* Widgets */
        .widgets {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
        }
        
        .widget-box {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--border-color);
            padding: 15px;
            width: 200px;
        }

        .widget-title { color: var(--neon-amber); margin-bottom: 10px; font-size: 0.7rem; letter-spacing: 1px;}

    </style>
</head>
<body>
    <header>
        <div class="system-status">
            <div style="width: 10px; height: 10px; background: var(--neon-green);" class="blink"></div>
            <span>SYS.MONITOR.ACTIVE</span>
        </div>
        <div style="text-align: right;">
            <div class="label">CURRENT BALANCE</div>
            <div class="big-stat">$2,528.36</div>
        </div>
    </header>

    <main>
        <aside>
            <div style="margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                <span style="color: var(--neon-blue)">>> INCOMING_TRANSMISSIONS</span>
            </div>
            <ul class="tactical-list" id="tx-list">
                <!-- Injected via JS -->
            </ul>
        </aside>

        <section class="chart-container">
            <div class="widgets">
                <div class="widget-box">
                    <div class="widget-title">DAYS TO ZERO</div>
                    <div style="font-size: 2rem; color: var(--text-color);">42</div>
                </div>
                <div class="widget-box">
                    <div class="widget-title">NEXT_INFLOW</div>
                    <div style="font-size: 1.2rem; color: var(--neon-green);">+$3,877.00</div>
                    <div style="font-size: 0.8rem; color: #888;">IN 14 DAYS</div>
                </div>
            </div>

            <!-- The Danger Line (Rent) -->
            <div class="rent-threshold-line" style="bottom: 25%">
                <div class="rent-label">CRITICAL THRESHOLD: RENT ($2,650)</div>
            </div>
            
            <div class="timeline-wrapper" id="timeline">
                <!-- Bars injected via JS -->
            </div>
            
            <div class="time-axis">
                <span>TODAY</span>
                <span>T+7</span>
                <span>T+14</span>
                <span>T+21</span>
                <span>T+30</span>
                <span>T+60</span>
            </div>
        </section>
    </main>

    <script>
        // Mock Data based on user inputs
        const today = new Date('2026-02-08');
        let currentBalance = 2528.36;
        
        // Simplified loop from new_data.json logic
        const transactions = [
            { date: '2026-02-08', name: 'FOOD (weekly)', amount: -120, type: 'out' },
            { date: '2026-02-15', name: 'FOOD (weekly)', amount: -120, type: 'out' },
            { date: '2026-02-20', name: 'Various Subs', amount: -60, type: 'out' },
            { date: '2026-02-22', name: 'Google', amount: -9.99, type: 'out' },
            { date: '2026-02-23', name: 'Paycheck', amount: 3877, type: 'in' },
            { date: '2026-02-23', name: 'BeyondFinance', amount: -579.26, type: 'out' },
            { date: '2026-03-01', name: 'Essentials', amount: -200, type: 'out' },
            { date: '2026-03-05', name: 'Rent (Calypso)', amount: -2650, type: 'out' },
            { date: '2026-03-06', name: 'Student Loan', amount: -324.33, type: 'out' },
        ];

        // Process Ledger
        const ledger = [];
        let running = currentBalance;
        
        // Generate daily points for 30 days
        for(let i=0; i<30; i++) {
            const d = new Date(today);
            d.setDate(today.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            
            // Find txs for this day
            const dailyTxs = transactions.filter(t => t.date === dateStr);
            let dayChange = 0;
            dailyTxs.forEach(t => dayChange += t.amount);
            
            running += dayChange;
            
            ledger.push({
                date: dateStr,
                balance: running,
                txs: dailyTxs
            });
        }

        // Render List
        const listEl = document.getElementById('tx-list');
        transactions.forEach(t => {
            const li = document.createElement('li');
            li.className = `tactical-item ${t.type === 'in' ? 'safe' : 'warning'}`;
            li.innerHTML = `
                <div class="item-row">
                    <span class="item-name">${t.name}</span>
                    <span class="item-amt ${t.type === 'in' ? 'pos' : 'neg'}">${Math.abs(t.amount)}</span>
                </div>
                <div class="item-date">${t.date}</div>
            `;
            listEl.appendChild(li);
        });

        // Render Bars
        const timelineEl = document.getElementById('timeline');
        const maxBal = Math.max(...ledger.map(d => d.balance), 5000);
        
        ledger.forEach(day => {
            const bar = document.createElement('div');
            const percent = Math.max(0, (day.balance / maxBal) * 100);
            
            // If balance drops below 2650 (Rent), mark it red
            const isDanger = day.balance < 2650;
            
            bar.className = `bar ${isDanger ? 'danger-zone' : ''}`;
            bar.style.height = `${percent}%`;
            
            bar.innerHTML = `
                <div class="bar-tooltip">
                    <strong>${day.date}</strong><br>
                    BAL: $${day.balance.toFixed(2)}
                </div>
            `;
            
            timelineEl.appendChild(bar);
        });
    </script>
</body>
</html>
