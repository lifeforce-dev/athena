<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBITAL COMMAND // RESOURCE MONITOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --hex-bg: #0b0f19;
            --ui-border: #1f2d40;
            --mineral-blue: #42a5f5;
            --vespene-green: #66bb6a;
            --alert-red: #ef5350;
            --ui-panel: rgba(16, 26, 41, 0.95);
        }

        body {
            background-color: var(--hex-bg);
            color: #cfd8dc;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: grid;
            grid-template-rows: 80px 1fr;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(30, 40, 60, 0.4) 0%, transparent 70%),
                linear-gradient(0deg, rgba(0,0,0,0.8), transparent 2px);
            background-size: 100% 100%, 100% 4px;
        }

        /* Top Bar: Global Resources */
        .top-deck {
            background: var(--ui-panel);
            border-bottom: 2px solid var(--ui-border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .resource-group {
            display: flex;
            gap: 40px;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .res-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(45deg, var(--mineral-blue), #1e88e5);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: grid;
            place-items: center;
            font-weight: bold;
            color: #000;
            font-size: 0.8rem;
        }

        .res-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 10px var(--mineral-blue);
        }
        
        .res-label { font-size: 0.8rem; color: #78909c; text-transform: uppercase; letter-spacing: 2px; }

        .burn-rate {
            color: var(--alert-red);
            font-family: 'Orbitron', sans-serif;
            border: 1px solid var(--alert-red);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        /* Main View */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            padding: 20px;
            gap: 20px;
            height: 100%;
        }

        /* Build Queue (Bills) */
        .queue-panel {
            background: var(--ui-panel);
            border: 1px solid var(--ui-border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-header {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            font-size: 0.9rem;
            color: var(--mineral-blue);
            border-bottom: 1px solid var(--ui-border);
        }

        .unit-queue {
            overflow-y: auto;
            flex: 1;
            padding: 10px;
            list-style: none;
        }

        .queue-item {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            margin-bottom: 8px;
            padding: 10px;
            border-left: 3px solid #333;
            transition: all 0.2s;
        }

        .queue-item:hover {
            background: rgba(255,255,255,0.05);
            border-left-color: var(--mineral-blue);
        }

        .queue-item.income { border-left-color: var(--vespene-green); }
        .queue-item.threat { border-left-color: var(--alert-red); }

        .q-icon {
            width: 30px; height: 30px;
            background: #223;
            border: 1px solid #445;
            margin-right: 15px;
            display: grid;
            place-items: center;
            font-size: 0.7rem;
            color: #667;
        }

        .q-info { flex: 1; }
        .q-name { font-weight: 700; font-size: 1rem; color: #eceff1; }
        .q-time { font-size: 0.8rem; color: #607d8b; }
        .q-cost { font-family: 'Orbitron'; color: #b0bec5; font-size: 0.9rem;}
        
        /* Map / Timeline */
        .tactical-map {
            background: var(--ui-panel);
            border: 1px solid var(--ui-border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* "Fog of War" styling for graph */
        .graph-area {
            flex: 1;
            position: relative;
            padding: 20px;
            display: flex;
            align-items: flex-end;
            background: 
                linear-gradient(rgba(66, 165, 245, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(66, 165, 245, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        .supply-limit-line {
            position: absolute;
            width: 100%;
            border-top: 1px dashed var(--alert-red);
            left: 0;
            z-index: 5;
        }
        
        .supply-label {
            position: absolute;
            right: 10px;
            top: -20px;
            color: var(--alert-red);
            font-size: 0.8rem;
            background: #000;
            padding: 2px 5px;
        }

        .bar-container {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 100%;
        }

        .res-bar {
            flex: 1;
            background: rgba(66, 165, 245, 0.2);
            border-top: 2px solid var(--mineral-blue);
            transition: height 0.5s;
            position: relative;
        }

        .res-bar.critical {
            background: rgba(239, 83, 80, 0.2);
            border-top-color: var(--alert-red);
        }

        /* Hover Intel */
        .res-bar:hover::after {
            content: attr(data-val);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid var(--mineral-blue);
            padding: 5px;
            font-size: 0.8rem;
            white-space: nowrap;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="top-deck">
        <div class="resource-group">
            <div class="resource">
                <div class="res-icon">MIN</div>
                <div>
                    <div class="res-val" id="current-minerals">2,528</div>
                    <div class="res-label">Current Minerals</div>
                </div>
            </div>
            <div class="resource">
                <div class="res-icon" style="background:linear-gradient(45deg, var(--vespene-green), #43a047)">GAS</div>
                <div>
                    <div class="res-val">+3,877</div>
                    <div class="res-label">Incoming Supply Drop</div>
                </div>
            </div>
        </div>
        <div style="text-align: right;">
             <div class="res-label">Base Burn Rate</div>
             <div class="burn-rate">- $85 / day avg</div>
        </div>
    </div>

    <main>
        <div class="queue-panel">
            <div class="panel-header">PROUCTION QUEUE (NEXT 30d)</div>
            <ul class="unit-queue" id="build-queue">
                <!-- JS Injected -->
            </ul>
        </div>

        <div class="tactical-map">
            <div class="panel-header">RESOURCE PROJECTION // TACTICAL VIEW</div>
            
            <div class="graph-area">
                <!-- Red Line for Rent -->
                <div class="supply-limit-line" style="bottom: 30%">
                    <div class="supply-label">⚠️ RENT THRESHOLD DETECTED</div>
                </div>
                
                <div class="bar-container" id="bar-chart">
                    <!-- Bars -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // Data Mock
        const today = new Date('2026-02-08');
        const queueData = [
            { name: "Food Rations", cost: 120, time: "T-0 (Today)", type: 'threat' },
            { name: "Food Rations", cost: 120, time: "T-7 days", type: 'threat' },
            { name: "Supply Drop", cost: 3877, time: "T-15 days", type: 'income' },
            { name: "Debt Service", cost: 579, time: "T-15 days", type: 'threat' },
            { name: "BASE RENT", cost: 2650, time: "T-25 days", type: 'threat' },
            { name: "Academia Tax", cost: 324, time: "T-26 days", type: 'threat' },
        ];

        // Render Queue
        const qContainer = document.getElementById('build-queue');
        queueData.forEach(item => {
            const li = document.createElement('li');
            li.className = `queue-item ${item.type}`;
            li.innerHTML = `
                <div class="q-icon"></div>
                <div class="q-info">
                    <div class="q-name">${item.name}</div>
                    <div class="q-time">${item.time}</div>
                </div>
                <div class="q-cost">${item.type === 'income' ? '+' : '-'}${item.cost}</div>
            `;
            qContainer.appendChild(li);
        });

        // Render Bars (Simplified Logic)
        const barContainer = document.getElementById('bar-chart');
        let balance = 2528;
        const max = 6000;
        
        // Mock timeline generation
        for(let i=0; i<30; i++) {
            // Rough heuristic for demo visuals
            if (i > 0 && i % 7 === 0) balance -= 120; // food
            if (i === 15) balance += (3877 - 579); // Paycheck - debt
            if (i === 25) balance -= 2650; // Rent
            
            const pct = Math.max(0, (balance / max) * 100);
            
            const bar = document.createElement('div');
            // If balance drops below rent cost before rent is paid, or generally low
            const isCrit = balance < 1000;
            
            bar.className = `res-bar ${isCrit ? 'critical' : ''}`;
            bar.style.height = `${pct}%`;
            bar.setAttribute('data-val', `$${balance}`);
            
            barContainer.appendChild(bar);
        }

    </script>
</body>
</html>
