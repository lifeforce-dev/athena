<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTUARY // MANA POOL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: #dcdcdc;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIiBmaWxsPSJub25lIiBzdHJva2U9IiMzMzMiIHN0cm9rZS13aWR0aD0iMSI+PHBhdGggZD0iTTAgNDAgNDAgMCIvPjwvc3ZnPg==');
            background-size: 20px 20px;
            background-color: #0d0812;
        }

        .altar {
            display: grid;
            grid-template-columns: 1fr 400px;
            width: 1000px;
            height: 700px;
            background: rgba(20, 10, 30, 0.8);
            border: 2px solid #332244;
            border-radius: 40px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Left: The Pool */
        .pool-chamber {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 2px solid #332244;
        }

        .orb-container {
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 4px solid #443355;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px #5522aa;
            background: #11081a;
        }

        .mana-fluid {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(180deg, #b388ff, #6200ea);
            box-shadow: 0 0 40px #6200ea;
            transition: height 1s;
        }
        
        .mana-fluid::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 10px;
            background: rgba(255,255,255,0.4);
            filter: blur(5px);
        }

        .mana-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .val { 
            font-size: 4rem; 
            font-family: 'Cinzel Decorative', serif; 
            font-weight: 700;
            text-shadow: 0 0 20px #a311ff;
        }
        
        .lbl { font-size: 1rem; color: #aaa; letter-spacing: 3px; text-transform: uppercase; }

        /* Right: The Scroll (List) */
        .scroll-panel {
            padding: 30px;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        h2 { margin: 0 0 20px 0; font-family: 'Cinzel Decorative'; color: #b388ff; border-bottom: 1px solid #443355; padding-bottom: 10px; }

        .rune-list {
            flex: 1;
            overflow-y: auto;
        }

        .rune-row {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            transition: transform 0.2s;
        }
        
        .rune-row:hover { transform: translateX(5px); border-color: #7c4dff; background: rgba(124, 77, 255, 0.1); }

        .rune-icon {
            width: 30px; height: 30px;
            border-radius: 50%;
            margin-right: 15px;
            display: grid;
            place-items: center;
            font-size: 0.8rem;
        }
        
        .drain .rune-icon { border: 1px solid #ff5252; color: #ff5252; box-shadow: 0 0 5px #ff5252; }
        .gain .rune-icon { border: 1px solid #69f0ae; color: #69f0ae; box-shadow: 0 0 5px #69f0ae; }
        
        .rune-info { flex: 1; }
        .r-name { font-weight: bold; font-size: 1.1rem; }
        .r-date { font-size: 0.8rem; color: #888; }
        
        .r-amt { font-family: 'Cinzel Decorative'; font-size: 1.2rem; }
        .drain .r-amt { color: #ff8a80; }
        .gain .r-amt { color: #b9f6ca; }

        /* KPI Bubbles at bottom */
        .kpi-row {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .kpi-card {
            background: #1a1a25;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .kpi-val { font-size: 1.5rem; color: #fff; font-weight: bold; }
        .kpi-lbl { font-size: 0.7rem; color: #666; text-transform: uppercase; }

    </style>
</head>
<body>
    <div class="altar">
        <div class="pool-chamber">
            <div class="orb-container">
                <div class="mana-fluid" style="height: 42%;"></div>
                <div class="mana-text">
                    <div class="val">2,528</div>
                    <div class="lbl">Mana Available</div>
                </div>
            </div>
            
            <div style="position:absolute; bottom: 20px; color: #666; font-size: 0.8rem;">
                CAPACITY: 6,000
            </div>
        </div>

        <div class="scroll-panel">
            <h2>Prophecy Scroll</h2>
            <div class="rune-list">
                <div class="rune-row drain">
                    <div class="rune-icon">✖</div>
                    <div class="rune-info">
                        <div class="r-name">Weekly Rations</div>
                        <div class="r-date">Today</div>
                    </div>
                    <div class="r-amt">-120</div>
                </div>
                
                 <div class="rune-row drain">
                    <div class="rune-icon">✖</div>
                    <div class="rune-info">
                        <div class="r-name">Weekly Rations</div>
                        <div class="r-date">Feb 15</div>
                    </div>
                    <div class="r-amt">-120</div>
                </div>

                <div class="rune-row gain">
                    <div class="rune-icon">✦</div>
                    <div class="rune-info">
                        <div class="r-name">Arcane Infusion</div>
                        <div class="r-date">Feb 23</div>
                    </div>
                    <div class="r-amt">+3,877</div>
                </div>
                
                <div class="rune-row drain">
                    <div class="rune-icon">⚠</div>
                    <div class="rune-info">
                        <div class="r-name">Tower Tithe (Rent)</div>
                        <div class="r-date">Mar 05</div>
                    </div>
                    <div class="r-amt">-2,650</div>
                </div>
            </div>
            
            <div class="kpi-row">
                <div class="kpi-card">
                    <div class="kpi-val">15</div>
                    <div class="kpi-lbl">Days to Infusion</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-val" style="color: #ff5252">42</div>
                    <div class="kpi-lbl">Days to Depletion</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
